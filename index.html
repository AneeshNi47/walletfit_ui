    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://fynbee.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FynBee - Smart Household Finance Management" />
    <meta name="twitter:description" content="Track expenses, manage budgets, split costs with family & roommates. Multi-account support, reports, and more." />

    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

      },

      },

        "Budget Planning",
